<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عطر الملوك | Luxury Perfumes</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #b39151; --bg: #000; --card: #111; --text: #fff; --gray: #888;
            --nav: rgba(0,0,0,0.9); --transition: 0.4s ease;
        }
        .light-mode {
            --bg: #fff; --card: #f5f5f5; --text: #111; --gray: #555; --nav: rgba(255,255,255,0.9);
        }

        body { background: var(--bg); color: var(--text); margin: 0; font-family: 'Cairo', sans-serif; transition: var(--transition); }
        
        /* Navbar */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000; background: var(--nav);
            padding: 15px 50px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(128,128,128,0.2); box-sizing: border-box;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-icon { font-size: 1.8rem; color: var(--gold); }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold); font-weight: 700; letter-spacing: 2px; }

        .nav-tools { display: flex; gap: 15px; }
        .tool-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 12px; cursor: pointer; font-size: 0.8rem; }

        /* Banner */
        .hero {
            height: 90vh; background: linear-gradient(to right, rgba(0,0,0,0.7), transparent), url('https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?q=80&w=1500') center/cover;
            display: flex; align-items: center; padding: 0 10%; margin-top: 60px;
        }
        .hero-content h2 { font-family: 'Playfair Display', serif; font-size: 4rem; margin: 0; }
        .hero-content h2 span { color: var(--gold); font-style: italic; }

        /* Sections */
        .section { padding: 80px 10%; }
        .section-title { text-align: center; margin-bottom: 50px; font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--gold); }

        /* Filter */
        .filter-bar { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
        .filter-btn { background: none; border: none; color: var(--gray); cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .filter-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        /* Products Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .p-card { background: var(--card); border: 1px solid rgba(128,128,128,0.1); transition: 0.5s; position: relative; }
        .p-card:hover { transform: translateY(-10px); border-color: var(--gold); }
        .p-img { width: 100%; height: 400px; object-fit: cover; }
        .p-info { padding: 20px; text-align: center; }
        .p-price { color: var(--gold); font-size: 1.3rem; display: block; margin: 10px 0; }
        .btn-add { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px 30px; cursor: pointer; transition: 0.3s; }
        .btn-add:hover { background: var(--gold); color: #000; }

        /* Shopping Cart Sidebar */
        .cart-sidebar {
            position: fixed; top: 0; left: -400px; width: 350px; height: 100%; background: var(--card);
            z-index: 2000; transition: 0.5s; padding: 30px; box-shadow: 5px 0 15px rgba(0,0,0,0.5); overflow-y: auto;
        }
        .cart-sidebar.open { left: 0; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }

        /* Modal Product Details */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 40px; max-width: 800px; width: 90%; display: flex; gap: 30px; position: relative; }
        .close-modal { position: absolute; top: 10px; right: 20px; font-size: 2rem; cursor: pointer; }

        /* Payment Tags */
        .payment-methods { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .pay-tag { font-size: 0.7rem; border: 1px solid var(--gray); padding: 3px 8px; color: var(--gray); }

        /* Floating Buttons */
        .float-cart { position: fixed; bottom: 30px; right: 30px; background: var(--gold); color: #000; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 1000; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <div class="logo-area">
        <span class="logo-icon">👑</span>
        <div class="logo-text" id="logoText">عطر الملوك</div>
    </div>
    <div class="nav-tools">
        <button class="tool-btn" onclick="toggleLang()" id="langBtn">English</button>
        <button class="tool-btn" onclick="toggleTheme()" id="themeBtn">☀️ Mode</button>
    </div>
</nav>

<section class="hero">
    <div class="hero-content">
        <h2 id="heroTitle">فخامةٌ تليقُ <br><span>بالملوك</span></h2>
        <p id="heroSub">أرقى العطور العالمية، نوصلها لباب بيتك بالرياض</p>
        <button class="btn-add" style="background:var(--gold); color:#000; border:none;" onclick="scrollToSection('shop')" id="orderNow">اطلب الآن</button>
    </div>
</section>

<section class="section" id="shop">
    <h3 class="section-title" id="newArrivals">أحدث المنتجات</h3>
    
    <div class="filter-bar">
        <button class="filter-btn active" onclick="filterP('all')" id="fAll">الكل</button>
        <button class="filter-btn" onclick="filterP('رجالي')" id="fMen">رجالي</button>
        <button class="filter-btn" onclick="filterP('نسائي')" id="fWomen">نسائي</button>
        <button class="filter-btn" onclick="filterP('فخم')" id="fLuxury">فخم</button>
    </div>

    <div class="grid" id="productGrid"></div>
</section>

<div class="cart-sidebar" id="cartSidebar">
    <h2 id="cartTitle">سلة المشتريات</h2>
    <div id="cartItems"></div>
    <hr>
    <h4 id="totalText">الإجمالي: 0 ريال</h4>
    <p style="font-size: 0.8rem;" id="payNote">الدفع: راجحي أو عند الاستلام</p>
    <button class="btn-add" style="width: 100%;" onclick="checkoutWA()" id="confirmWA">تأكيد عبر واتساب</button>
    <button class="tool-btn" style="width: 100%; margin-top:10px;" onclick="toggleCart()">إغلاق</button>
</div>

<div class="modal" id="pModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <img id="mImg" src="" style="width: 50%; height: 400px; object-fit: cover;">
        <div style="flex:1">
            <h2 id="mName"></h2>
            <p id="mDesc" style="color:var(--gray)"></p>
            <div id="mRating" style="color:var(--gold); margin-bottom: 10px;">⭐⭐⭐⭐⭐</div>
            <span class="p-price" id="mPrice"></span>
            <button class="btn-add" onclick="addToCartFromModal()" id="mAdd">إضافة للسلة</button>
            <div class="payment-methods">
                <span class="pay-tag">RAJHI BANK</span>
                <span class="pay-tag">CASH</span>
            </div>
        </div>
    </div>
</div>

<div class="float-cart" onclick="toggleCart()">🛒 <span id="cartCount">0</span></div>

<script>
    let currentLang = 'ar';
    let cart = [];
    let products = JSON.parse(localStorage.getItem('muluk_products')) || [
        {id:1, name:'عود ملكي', price:450, img:'https://images.unsplash.com/photo-1541643600914-78b084683601?q=80&w=500', cat:'فخم', desc:'مزيج من العود الكمبودي الفاخر مع لمسة من الزعفران.'},
        {id:2, name:'ليالي الرياض', price:320, img:'https://images.unsplash.com/photo-1594035910387-fea47794261f?q=80&w=500', cat:'نسائي', desc:'عطر زهري شرقي يجسد أناقة الليالي العاصمية.'}
    ];

    const langData = {
        ar: {
            logo: "عطر الملوك", heroTitle: "فخامةٌ تليقُ <br><span>بالملوك</span>", heroSub: "أرقى العطور العالمية، نوصلها لباب بيتك بالرياض",
            orderNow: "اطلب الآن", newArrivals: "أحدث المنتجات", fAll: "الكل", fMen: "رجالي", fWomen: "نسائي", fLuxury: "فخم",
            cartTitle: "سلة المشتريات", totalText: "الإجمالي", confirmWA: "تأكيد عبر واتساب", mAdd: "إضافة للسلة"
        },
        en: {
            logo: "ETAR AL MULUK", heroTitle: "Luxury Crafted <br><span>for Royalty</span>", heroSub: "Finest perfumes, delivered to your door in Riyadh",
            orderNow: "Order Now", newArrivals: "New Arrivals", fAll: "All", fMen: "Men", fWomen: "Women", fLuxury: "Luxury",
            cartTitle: "Shopping Cart", totalText: "Total", confirmWA: "Confirm via WhatsApp", mAdd: "Add to Cart"
        }
    };

    function displayProducts(filter = 'all') {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';
        const filtered = filter === 'all' ? products : products.filter(p => p.cat === filter);

        filtered.forEach(p => {
            grid.innerHTML += `
                <div class="p-card">
                    <img src="${p.img}" class="p-img" onclick="openModal(${p.id})">
                    <div class="p-info">
                        <h4>${p.name}</h4>
                        <span class="p-price">${p.price} ريال</span>
                        <button class="btn-add" onclick="addToCart(${p.id})">${langData[currentLang].mAdd}</button>
                    </div>
                </div>
            `;
        });
    }

    let tempProd = null;
    function openModal(id) {
        tempProd = products.find(p => p.id === id);
        document.getElementById('mName').innerText = tempProd.name;
        document.getElementById('mPrice').innerText = tempProd.price + " ريال";
        document.getElementById('mDesc').innerText = tempProd.desc;
        document.getElementById('mImg').src = tempProd.img;
        document.getElementById('pModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('pModal').style.display = 'none'; }

    function addToCart(id) {
        const p = products.find(item => item.id === id);
        cart.push(p);
        updateCart();
    }

    function addToCartFromModal() { addToCart(tempProd.id); closeModal(); }

    function updateCart() {
        document.getElementById('cartCount').innerText = cart.length;
        const list = document.getElementById('cartItems');
        list.innerHTML = '';
        let total = 0;
        cart.forEach((item, index) => {
            total += parseInt(item.price);
            list.innerHTML += `
                <div class="cart-item">
                    <span>${item.name}</span>
                    <span>${item.price} ر.س <button onclick="removeItem(${index})" style="background:none; border:none; color:red; cursor:pointer;">×</button></span>
                </div>
            `;
        });
        document.getElementById('totalText').innerText = `${langData[currentLang].totalText}: ${total} ريال`;
    }

    function removeItem(index) { cart.splice(index, 1); updateCart(); }

    function toggleCart() { document.getElementById('cartSidebar').classList.toggle('open'); }

    function checkoutWA() {
        if(cart.length === 0) return alert("السلة فارغة");
        let msg = `*طلب جديد من متجر عطر الملوك*%0A`;
        cart.forEach(item => msg += `- ${item.name} (${item.price} ريال)%0A`);
        msg += `%0A*الإجمالي:* ${document.getElementById('totalText').innerText}`;
        window.open(`https://wa.me/966559300845?text=${msg}`);
    }

    function toggleLang() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        const html = document.getElementById('mainHtml');
        html.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        html.lang = currentLang;
        
        document.getElementById('logoText').innerText = langData[currentLang].logo;
        document.getElementById('heroTitle').innerHTML = langData[currentLang].heroTitle;
        document.getElementById('heroSub').innerText = langData[currentLang].heroSub;
        document.getElementById('orderNow').innerText = langData[currentLang].orderNow;
        document.getElementById('newArrivals').innerText = langData[currentLang].newArrivals;
        document.getElementById('cartTitle').innerText = langData[currentLang].cartTitle;
        document.getElementById('confirmWA').innerText = langData[currentLang].confirmWA;
        document.getElementById('langBtn').innerText = currentLang === 'ar' ? "English" : "العربية";
        
        displayProducts();
    }

    function toggleTheme() { document.body.classList.toggle('light-mode'); }
    function scrollToSection(id) { document.getElementById(id).scrollIntoView({behavior:'smooth'}); }
    function filterP(cat) { 
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        displayProducts(cat); 
    }

    displayProducts();
</script>

</body>
</html>
